name: Deploy Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy Bicep to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Lint Bicep
        run: |
          az bicep install
          az bicep lint --file webservice/infra/main.bicep

      - name: Deploy Bicep
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --template-file webservice/infra/main.bicep \
              --parameters \
                appName="${{ secrets.APP_NAME }}" \
                location="${{ secrets.AZURE_LOCATION }}" \
                appServicePlanName="${{ secrets.APP_SERVICE_PLAN_NAME }}" \
                appInsightsName="${{ secrets.APP_INSIGHTS_NAME }}" \
                customDomain="${{ secrets.APP_CUSTOM_DOMAIN }}" \
                oauthTokenSecret="${{ secrets.OAUTH_TOKEN_SECRET }}" \
                oauthAccessTokenLifetimeDays="${{ secrets.OAUTH_ACCESS_TOKEN_LIFETIME_DAYS || '30' }}" \
                oauthClientStorageAccountName="stbrandsadvisorycentral" \
                oauthClientTableName="mcpoauthclients" \
                standardLibraryAthleteId="${{ secrets.STANDARD_LIBRARY_ATHLETE_ID }}" \
                mcpTraceResponseJson="${{ secrets.MCP_TRACE_RESPONSE_JSON }}" \
                mcpTraceResponsePreviewLimit="${{ secrets.MCP_TRACE_RESPONSE_PREVIEW_LIMIT }}" \
                mcpRpcEventLogLevel="${{ secrets.MCP_RPC_EVENT_LOG_LEVEL }}"
