name: Deploy Foundry Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'foundry-agent/**'
      - 'coach-logic/**'
      - 'prompts/discipline_*.md'

permissions:
  id-token: write   # required for OIDC
  contents: read

concurrency:
  group: deploy-foundry-agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-agent:
    name: Deploy Foundry prompt agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r foundry-agent/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy agent and rebuild vector store
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
        run: python foundry-agent/deploy_agent.py
